            choiceQuestions.forEach(function(q, i) {
                var n = i + 1;
                html += '<div class="question-block" data-qid="choice-' + n + '">';
                html += '<div class="q-head">' + n + '. </div>';
                if (q.img) html += '<img src="' + q.img + '" class="img-stem" alt="第' + n + '题附图">';
                html += '<div class="q-text">' + q.question + '</div>';
                html += '<div class="options" data-correct="' + q.correct + '">';
                q.options.forEach(function(o) {
                    html += '<div class="option" data-value="' + o.charAt(0) + '">' + o + '</div>';
                });
                html += '</div><button class="toggle-explain" data-target="choice-' + n + '">📖 显示解析</button>';
                html += '<div class="explanation" id="expl-choice-' + n + '">' + q.explanation + '</div></div>';
            });
            return html;
        }

        function renderSubjectives() {
            var html = '<h2 style="font-size:16pt;border-left:5px solid #8b5cf6;padding-left:14px;margin:34px 0 20px 0;color:#5b21b6;">二、非选择题（共4题，共52分）</h2>';
            subjectiveQuestions.forEach(function(q) {
                var qNum = q.id;
                html += '<div class="question-block" data-qid="sub-' + qNum + '">';
                html += '<div class="q-head">' + qNum + '. </div>';
                html += '<div class="q-text">' + q.question + '</div>';
                q.parts.forEach(function(part, pi) {
                    var partId = "sub-" + qNum + "-" + (pi + 1);
                    html += '<div class="sub-part">';
                    html += '<div class="label">' + part.label + '</div>';
                    html += '<div class="p-text">' + part.text + '</div>';
                    html += '<button class="toggle-explain" data-target="' + partId + '">📖 显示解析</button>';
                    html += '<div class="explanation" id="expl-' + partId + '">' + part.explanation + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            });
            return html;
        }

        container.innerHTML = render() + renderSubjectives();

        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll(".option").forEach(function(el) {
                el.addEventListener("click", function() {
                    if (this.classList.contains("disabled")) return;
                    var p = this.closest(".options");
                    var correct = p.dataset.correct;
                    var sel = this.dataset.value;
                    p.querySelectorAll(".option").forEach(function(o) { o.classList.add("disabled"); });
                    p.querySelectorAll(".option").forEach(function(o) {
                        if (o.dataset.value === correct) o.classList.add("correct");
                        else if (o.dataset.value === sel && sel !== correct) o.classList.add("wrong");
                    });
                });
            });
            document.querySelectorAll(".toggle-explain").forEach(function(btn) {
                btn.addEventListener("click", function() {
                    var expl = document.getElementById("expl-" + this.dataset.target);
                    if (!expl) return;
                    if (expl.classList.contains("show")) {
                        expl.classList.remove("show"); this.textContent = "📖 显示解析"; this.classList.remove("active");
                    } else {
                        expl.classList.add("show"); this.textContent = "📕 收起解析"; this.classList.add("active");
                    }
                });
            });
        });
    </script>
</body>
</html>
