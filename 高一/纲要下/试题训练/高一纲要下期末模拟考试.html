                                <li>苏联计划经济体制与布雷顿森林体系的自由市场原则不兼容。</li>
                            </ul>
                        </div>
                        <div class="sub-ans" style="margin-top:16px;">(2) 影响（6分）</div>
                        <div class="sub-ans-detail">
                            <ul>
                                <li>加剧美苏冷战对立，加速两极格局形成；</li>
                                <li>使布雷顿森林体系成为资本主义阵营的货币体系，美元霸权得以巩固；</li>
                                <li>削弱了国际货币体系的全球性，不利于战后世界经济一体化；</li>
                                <li>苏联转而建立经互会，形成社会主义经济圈，加剧世界经济分裂。</li>
                            </ul>
                        </div>
                    `
        }];

        // ============================================================
        // 渲染函数
        // ============================================================
        function renderChoices() {
            const container = document.getElementById('choice-list');
            let html = '';
            choices.forEach((q, idx) => {
                const labels = ['A', 'B', 'C', 'D'];
                const correctIdx = q.answer;
                html += `<div class="question-block" data-qid="${q.id}">`;
                html += `<div class="q-header"><span class="q-label">${q.id}</span> <span>${q.text}</span></div>`;
                html += `<div class="options">`;
                q.options.forEach((opt, oi) => {
                    const isCorrect = (oi === correctIdx);
                    html += `<div class="option-item" data-optidx="${oi}" data-correct="${isCorrect}" onclick="selectOption(this, ${q.id}, ${oi})">`;
                    html += `<span class="opt-label">${labels[oi]}.</span>`;
                    html += `<span class="opt-text">${opt}</span>`;
                    html += `</div>`;
                });
                html += `</div>`;

                // 解析区域
                html += `<div class="toggle-answer" onclick="toggleAnswer(this, ${q.id})">`;
                html += `<span>📖 查看解析</span>`;
                html += `<span class="arrow">▶</span>`;
                html += `</div>`;

                html += `<div class="answer-box" id="ans-${q.id}">`;
                html += `<div class="know-point">📌 考查知识点：<span>${q.knowledge}</span></div>`;
                html += `<div class="reason">`;
                html += `<div class="correct-reason">✅ 正确选项原因：${q.correctReason}</div>`;
                html += `<div style="margin-top:10px; font-weight:500; color:#1e2a3a;">❌ 错误选项不选原因：</div>`;
                html += `<div class="wrong-detail">`;
                q.wrongReasons.forEach((wr, wi) => {
                    const label = labels[wi];
                    html += `<div><strong>${label}.</strong> ${wr}</div>`;
                });
                html += `</div>`;
                html += `</div>`;
                html += `</div>`;
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function renderMaterials() {
            const container = document.getElementById('material-list');
            let html = '';
            materials.forEach((m, idx) => {
                html += `<div class="question-block material-q" data-mid="${m.id}">`;
                html += `<div class="q-header"><span class="q-label">${m.id}</span> <span>（${m.score}分）${m.title}</span></div>`;
                html += `<div class="q-text">${m.material}</div>`;
                m.questions.forEach((qText, qi) => {
                    const subLabel = String.fromCharCode(97 + qi); // a, b, c...
                    html += `<div class="sub-q">(${subLabel}) ${qText}</div>`;
                });
                // 解析
                html += `<div class="toggle-answer" onclick="toggleMaterialAnswer(this, ${m.id})">`;
                html += `<span>📖 查看解析</span>`;
                html += `<span class="arrow">▶</span>`;
                html += `</div>`;
                html += `<div class="answer-box material-answer" id="mans-${m.id}">`;
                html += m.answer;
                html += `</div>`;
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        // ============================================================
        // 交互函数
        // ============================================================
        function selectOption(el, qid, chosenIdx) {
            const block = el.closest('.question-block');
            const options = block.querySelectorAll('.option-item');
            // 如果已经选过，不能再选
            if (options[0].classList.contains('disabled')) return;

            // 标记所有选项为disabled
            options.forEach(opt => opt.classList.add('disabled'));

            // 判断正误
            const isCorrect = (chosenIdx === choices.find(q => q.id === qid).answer);
            if (isCorrect) {
                el.classList.add('correct');
            } else {
                el.classList.add('wrong');
                // 高亮正确答案
                options.forEach(opt => {
                    if (opt.dataset.correct === 'true') {
                        opt.classList.add('correct');
                    }
                });
            }

            // 自动展开解析
            const ansBox = document.getElementById(`ans-${qid}`);
            if (ansBox) {
                ansBox.classList.add('open');
                // 更新按钮箭头
                const toggle = block.querySelector('.toggle-answer');
                if (toggle) {
                    const arrow = toggle.querySelector('.arrow');
                    if (arrow) arrow.classList.add('open');
                    toggle.querySelector('span:first-child').textContent = '📖 收起解析';
                }
            }
        }

        function toggleAnswer(el, qid) {
            const block = el.closest('.question-block');
            const ansBox = document.getElementById(`ans-${qid}`);
            if (!ansBox) return;
            const isOpen = ansBox.classList.contains('open');
            if (isOpen) {
                ansBox.classList.remove('open');
                el.querySelector('span:first-child').textContent = '📖 查看解析';
                el.querySelector('.arrow').classList.remove('open');
            } else {
                ansBox.classList.add('open');
                el.querySelector('span:first-child').textContent = '📖 收起解析';
                el.querySelector('.arrow').classList.add('open');
            }
        }

        function toggleMaterialAnswer(el, mid) {
            const block = el.closest('.question-block');
            const ansBox = document.getElementById(`mans-${mid}`);
            if (!ansBox) return;
            const isOpen = ansBox.classList.contains('open');
            if (isOpen) {
                ansBox.classList.remove('open');
                el.querySelector('span:first-child').textContent = '📖 查看解析';
                el.querySelector('.arrow').classList.remove('open');
            } else {
                ansBox.classList.add('open');
                el.querySelector('span:first-child').textContent = '📖 收起解析';
                el.querySelector('.arrow').classList.add('open');
            }
        }

        // ============================================================
        // 初始化
        // ============================================================
        renderChoices();
        renderMaterials();
    </script>

</body>
</html>
