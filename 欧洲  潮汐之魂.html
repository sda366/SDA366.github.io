<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>欧洲：潮汐之魂 · 第一版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a120b;
      background-image: radial-gradient(ellipse at 20% 30%, #3e2a1a 0%, #0f0a05 90%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Georgia', 'Times New Roman', '宋体', serif;
      padding: 1.5rem;
    }
    .game-container {
      max-width: 750px;
      width: 100%;
      background: #f7efd6;
      border: 2px solid #b4975a;
      border-radius: 2.5rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7), inset 0 0 30px rgba(180,130,60,0.4);
      padding: 2rem;
      color: #2e2412;
    }
    h1 {
      font-size: 2.4rem;
      text-align: center;
      font-weight: normal;
      letter-spacing: 4px;
      color: #5b3c1a;
      text-shadow: 2px 2px 0 #d4b87a;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      text-align: center;
      font-style: italic;
      color: #7a5b38;
      border-top: 1px solid #c8aa6e;
      border-bottom: 1px solid #c8aa6e;
      padding: 0.5rem 0;
      margin-bottom: 1.5rem;
    }
    .stats-panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      background: #e7d5b7;
      border-radius: 3rem;
      padding: 0.8rem 1.5rem;
      margin-bottom: 1.8rem;
      border: 1px solid #b68b4e;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: bold;
    }
    .stat-value {
      background: #fef9ed;
      padding: 0.2rem 0.7rem;
      border-radius: 1.5rem;
      min-width: 2.5rem;
      text-align: center;
      border: 1px solid #b5955c;
    }
    .scene-text {
      background: #fdf8ed;
      border-left: 6px solid #b68b4e;
      padding: 1.5rem;
      margin: 1.5rem 0;
      border-radius: 1rem;
      font-size: 1.15rem;
      line-height: 1.8;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      min-height: 120px;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .choice-btn {
      background: linear-gradient(to bottom, #f3e7d3, #dec9a5);
      border: 1px solid #9e7a4b;
      padding: 1rem 1.2rem;
      border-radius: 2rem;
      font-size: 1.05rem;
      font-weight: bold;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #2d1f0c;
    }
    .choice-btn:hover {
      background: #c7a56b;
      border-color: #6b4f24;
      transform: translateY(-2px);
    }
    .choice-letter {
      background: #a77b3c;
      color: #fbf3e3;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
      flex-shrink: 0;
    }
    .era-badge {
      background: #9e7a4b;
      color: #f5e7cf;
      display: inline-block;
      padding: 0.3rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .ending-text {
      background: #2d1f0c;
      color: #f3e1c2;
      padding: 1.8rem;
      border-radius: 1.5rem;
      font-size: 1.15rem;
      line-height: 1.9;
      border: 2px solid #c9a562;
      text-align: center;
    }
    .restart-btn {
      background: #b68b4e;
      border: none;
      font-weight: bold;
      padding: 0.8rem;
      border-radius: 2rem;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 1.5rem;
      width: 100%;
    }
    .restart-btn:hover { background: #dbb45c; }
    @media (max-width: 500px) {
      .game-container { padding: 1.2rem; }
      h1 { font-size: 1.9rem; }
      .scene-text { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>欧洲：潮汐之魂</h1>
  <div class="subtitle">TIDES OF EUROPA · 第一版</div>
  <div id="statsPanel" class="stats-panel"></div>
  <div id="eraDisplay" class="era-badge"></div>
  <div id="sceneText" class="scene-text"></div>
  <div id="choicesContainer" class="choices"></div>
  <div id="restartArea"></div>
</div>

<script>
(function() {
  // ---------- 思潮状态 (使用纯英文变量名) ----------
  var scores = {
    faith: 0,
    reason: 0,
    glory: 0,
    wealth: 0,
    humanity: 0
  };
  var statNames = { faith:'虔信', reason:'理性', glory:'荣耀', wealth:'财富', humanity:'人本' };
  var statIcons = { faith:'✝️', reason:'🔬', glory:'⚔️', wealth:'💰', humanity:'🤝' };
  var currentSceneId = 'start';

  // ---------- 场景数据 ----------
  var scenes = {
    start: {
      era: '第一章 · 秩序的诞生 (476-900)',
      text: '公元476年，西罗马帝国最后的皇帝被废黜。你是一位蛮族首领，站在罗马广场的碎石上。一位元老颤抖着请求你维持法律；一位主教手捧圣经，沉默等待；你的将军们在身后磨刀霍霍。\n\n谁将成为新秩序的基石？',
      choices: [
        { text: '宣布自己是"罗马人的皇帝"，保留元老院与法律。', letter: 'A', effects: { reason:2, glory:1 }, next:'roman_path' },
        { text: '跪在主教面前接受洗礼，将土地赠予教会。', letter: 'B', effects: { faith:2, glory:1 }, next:'church_path' },
        { text: '拔剑分封亲兵，让他们各自称雄。', letter: 'C', effects: { glory:2, wealth:-1 }, next:'feudal_path' }
      ]
    },
    roman_path: {
      era: '第一章 · 罗马复兴梦',
      text: '你试图让罗马的荣耀复活。书记官呈上两堆文卷：日耳曼习惯法与查士丁尼法典。争吵声快要掀翻王帐。',
      choices: [
        { text: '编纂统一法典，全国遵守。', letter: 'A', effects: { reason:3, humanity:1 }, next:'charlemagne' },
        { text: '各用各法，国王只做最终裁决。', letter: 'B', effects: { humanity:2, reason:1 }, next:'charlemagne' },
        { text: '烧掉法典，我的话就是法律。', letter: 'C', effects: { glory:3, reason:-2 }, next:'charlemagne' }
      ]
    },
    church_path: {
      era: '第一章 · 虔诚的教父',
      text: '你虔诚地接受洗礼。伦巴第人入侵意大利，教皇求救。你翻越阿尔卑斯山击败敌人。现在，那片土地归谁？',
      choices: [
        { text: '"丕平献土"：正式赠予教皇，建立教皇国。', letter: 'A', effects: { faith:3, glory:1 }, next:'charlemagne' },
        { text: '保留土地，但任命亲信主教管理。', letter: 'B', effects: { faith:1, wealth:1 }, next:'charlemagne' },
        { text: '拒绝教皇，分封给自己的儿子。', letter: 'C', effects: { glory:2, faith:-2 }, next:'charlemagne' }
      ]
    },
    feudal_path: {
      era: '第一章 · 混沌的共主',
      text: '你将土地分给亲兵，他们筑起城堡。维京人的龙船冲进河口，伯爵们却趁机互斗。一名叫罗洛的维京首领要求土地定居。',
      choices: [
        { text: '割地封臣，让罗洛受洗成为藩属。', letter: 'A', effects: { glory:1, wealth:1 }, next:'charlemagne' },
        { text: '缴纳重金换取退兵。', letter: 'B', effects: { wealth:-2, faith:1 }, next:'charlemagne' },
        { text: '号召骑士决死一战。', letter: 'C', effects: { glory:3, humanity:-1 }, next:'charlemagne' }
      ]
    },
    charlemagne: {
      era: '公元800年 · 查理曼加冕',
      text: '你跪在圣彼得大教堂。教皇利奥三世将皇冠举过你的头顶。这一刻，你如何理解这顶皇冠？',
      choices: [
        { text: '接受教皇的恩赐：皇冠来自教权。', letter: 'A', effects: { faith:3, glory:1 }, next:'second_era_intro' },
        { text: '夺过皇冠自己戴上：皇帝直属于神。', letter: 'B', effects: { glory:3, reason:1 }, next:'second_era_intro' },
        { text: '拒绝加冕：皇帝的力量来自剑与人民。', letter: 'C', effects: { glory:2, humanity:1 }, next:'second_era_intro' }
      ]
    },
    second_era_intro: {
      era: '第二章 · 蛰伏与新生 (900-1300)',
      text: '人口增长，森林变良田。在主教座堂、罗马废墟旁，集市形成。人们说："城市的空气使人自由。" 你的国家如何面对这股新力量？',
      choices: [
        { text: '教会势力强大，由修道院引领复兴。', letter: 'A', effects: { faith:2, wealth:1 }, next:'investiture' },
        { text: '皇权与诸侯争斗，城市在夹缝中兴起。', letter: 'B', effects: { glory:2, wealth:1 }, next:'lombard_league' },
        { text: '市民通过赎买获得自治，自由城市涌现。', letter: 'C', effects: { humanity:2, wealth:2 }, next:'charter_towns' }
      ]
    },
    investiture: {
      era: '叙任权斗争',
      text: '教皇格列高利七世宣称只有教皇有权任命主教。你的王权与信仰对立。',
      choices: [
        { text: '卡诺莎悔罪，赤脚雪中求得原谅。', letter: 'A', effects: { faith:3, glory:-2 }, next:'university' },
        { text: '另立教皇，武力对抗。', letter: 'B', effects: { glory:3, faith:-2 }, next:'university' },
        { text: '妥协《沃姆斯宗教协定》，划分权限。', letter: 'C', effects: { reason:2, humanity:1 }, next:'university' }
      ]
    },
    lombard_league: {
      era: '伦巴第联盟',
      text: '米兰、热那亚等城市联合反抗你的总督。',
      choices: [
        { text: '大军围城，重申皇权。', letter: 'A', effects: { glory:3, wealth:-1 }, next:'university' },
        { text: '承认城市自治，换取年金与舰队。', letter: 'B', effects: { wealth:3, glory:1 }, next:'university' },
        { text: '分化瓦解，维持仲裁者地位。', letter: 'C', effects: { reason:2, glory:1 }, next:'university' }
      ]
    },
    charter_towns: {
      era: '特许状的代价',
      text: '城市获得自治，大封建主意图镇压。',
      choices: [
        { text: '与市民结盟，颁发更多特许状。', letter: 'A', effects: { humanity:2, wealth:2 }, next:'university' },
        { text: '召开等级会议，教士、贵族、市民共议。', letter: 'B', effects: { reason:3, humanity:1 }, next:'university' },
        { text: '限制城市扩张，维持秩序。', letter: 'C', effects: { glory:1, wealth:1 }, next:'university' }
      ]
    },
    university: {
      era: '12世纪末 · 大学的诞生',
      text: '巴黎、博洛尼亚等地聚集了成千上万的学生。大学诞生了。你如何看待这群知识分子？',
      choices: [
        { text: '赋予特权，自由研究。', letter: 'A', effects: { reason:3, faith:-1 }, next:'black_death_intro' },
        { text: '王室保护，但监控内容。', letter: 'B', effects: { reason:1, glory:2 }, next:'black_death_intro' },
        { text: '由教会管理，王权不涉入。', letter: 'C', effects: { faith:1 }, next:'black_death_intro' }
      ]
    },
    black_death_intro: {
      era: '第三章 · 危机与裂变 (1347)',
      text: '黑死病席卷欧洲，三分之一人口死亡。有人鞭笞自己，有人及时行乐。教会的权威开始出现裂痕。',
      choices: [
        { text: '强化宗教，镇压异端与女巫。', letter: 'A', effects: { faith:3, reason:-1 }, next:'church_shaken' },
        { text: '农奴逃离，起义爆发，最终废除农奴制。', letter: 'B', effects: { humanity:3, glory:-1 }, next:'church_shaken' },
        { text: '赞助艺术，人文主义如野火蔓延。', letter: 'C', effects: { reason:2, wealth:2 }, next:'church_shaken' }
      ]
    },
    church_shaken: {
      era: '教会权威动摇',
      text: '威克里夫和胡斯公开挑战教皇。变革之网笼罩欧洲。你的回应？',
      choices: [
        { text: '严厉镇压异端，保护教会统一。', letter: 'A', effects: { faith:3, reason:-2 }, next:'fourth_era' },
        { text: '推动内部改革，回归朴素。', letter: 'B', effects: { reason:2, humanity:1 }, next:'fourth_era' },
        { text: '利用批评削弱教权，加强君权。', letter: 'C', effects: { glory:2, wealth:1 }, next:'fourth_era' }
      ]
    },
    fourth_era: {
      era: '第四章 · 重塑世界 (1500-1800)',
      text: '哥伦布发现新大陆，路德贴出《九十五条论纲》，哥白尼颠覆宇宙。你的国家将扬帆哪片海洋？',
      choices: [
        { text: '探索与征服：资助远航，建立殖民帝国。', letter: 'A', effects: { wealth:4, glory:1 }, next:'enlightenment' },
        { text: '改革与信仰：捍卫新教，确立"教随国立"。', letter: 'B', effects: { faith:2, reason:1, wealth:2 }, next:'enlightenment' },
        { text: '沉思与革命：建立科学院，拥抱启蒙。', letter: 'C', effects: { reason:4, humanity:1 }, next:'enlightenment' }
      ]
    },
    enlightenment: {
      era: '启蒙运动 · 近代的门槛',
      text: '"权利"成为咖啡馆里的共同话题。政府凭什么统治？是上帝、刀剑，还是被统治者的同意？这是最后的重大抉择。',
      choices: [
        { text: '"朕即国家"：绝对王权，镇压异议。', letter: 'A', effects: { glory:5 }, next:'ending' },
        { text: '开明专制：自上而下的理性改革。', letter: 'B', effects: { reason:5 }, next:'ending' },
        { text: '让渡权力：立宪或共和，主权在民。', letter: 'C', effects: { humanity:5 }, next:'ending' }
      ]
    },
    ending: {
      era: '终章',
      text: '',
      choices: [],
      isEnding: true
    }
  };

  // 应用效果
  function applyEffects(effects) {
    for (var k in effects) {
      if (scores.hasOwnProperty(k)) scores[k] += effects[k];
    }
  }

  // 判断结局类型
  function getEndingType() {
    var max = -Infinity, type = 'glory';
    for (var k in scores) {
      if (scores[k] > max) { max = scores[k]; type = k; }
    }
    var priority = ['humanity','reason','wealth','faith','glory'];
    for (var i = 0; i < priority.length; i++) {
      if (scores[priority[i]] === max) return priority[i];
    }
    return type;
  }

  function getEndingText(type) {
    var map = {
      glory: '凯撒的胜利：你建立了一个铁血帝国，秩序井然，但图书馆的禁书区比公开区还大。这是"罗马和平"的现代版，静穆而令人窒息。',
      reason: '理性王国：技术官僚与科学院治理的世界。蒸汽机高效运转，法典完善，但人像钟表一样被规范。你创造了强大的工业文明，却可能遗忘了灵魂。',
      wealth: '商业帝国：一个全球化的资本网络，极度的奢华与极度的赤贫并存。世界是一个巨大的市场，艺术繁荣，但社会原子化。',
      faith: '信仰帝国：一个前所未有的虔诚共同体，科学和艺术皆为赞美上帝。温暖而静态的"神之城"，却可能错失了星辰大海。',
      humanity: '自由人的联合体：经过革命与改革，你建立了高福利的民主共和国。公民享有自由，权力受到监督。自由之花需要永远的浇灌与警惕。'
    };
    return map[type] || map.glory;
  }

  // 渲染统计
  function renderStats() {
    var panel = document.getElementById('statsPanel');
    if (!panel) return;
    var html = '';
    var keys = ['faith','reason','glory','wealth','humanity'];
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      html += '<div class="stat"><span>' + statIcons[k] + ' ' + statNames[k] + '</span> <span class="stat-value">' + scores[k] + '</span></div>';
    }
    panel.innerHTML = html;
  }

  // 渲染场景
  function renderScene(sceneId) {
    var scene = scenes[sceneId];
    if (!scene) return;
    document.getElementById('eraDisplay').textContent = scene.era || '';
    var textDiv = document.getElementById('sceneText');
    var choicesDiv = document.getElementById('choicesContainer');
    var restartDiv = document.getElementById('restartArea');
    restartDiv.innerHTML = '';

    if (scene.isEnding) {
      var type = getEndingType();
      textDiv.innerHTML = '<div class="ending-text"><h2>⚜️ 你的欧洲 ⚜️</h2><p style="font-size:1.4rem;"><strong>' + statIcons[type] + ' ' + statNames[type] + ' 结局</strong></p><p>' + getEndingText(type) + '</p><p style="margin-top:1rem; font-size:0.9rem;">历史没有如果，但你的每一个选择，都是对文明灵魂的叩问。<br>潮汐来去，文明不死。</p></div>';
      choicesDiv.innerHTML = '';
      restartDiv.innerHTML = '<button class="restart-btn" onclick="restartGame()">🔄 重新踏上历史之旅</button>';
      return;
    }

    textDiv.textContent = scene.text;
    choicesDiv.innerHTML = '';
    if (scene.choices && scene.choices.length > 0) {
      for (var idx = 0; idx < scene.choices.length; idx++) {
        var ch = scene.choices[idx];
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = '<span class="choice-letter">' + (ch.letter || String.fromCharCode(65+idx)) + '</span> ' + ch.text;
        (function(effects, nextId) {
          btn.addEventListener('click', function() {
            applyEffects(effects || {});
            currentSceneId = nextId || 'ending';
            renderStats();
            renderScene(currentSceneId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        })(ch.effects, ch.next);
        choicesDiv.appendChild(btn);
      }
    }
  }

  // 重启
  window.restartGame = function() {
    scores.faith = 0; scores.reason = 0; scores.glory = 0; scores.wealth = 0; scores.humanity = 0;
    currentSceneId = 'start';
    renderStats();
    renderScene('start');
  };

  // 启动
  window.addEventListener('DOMContentLoaded', function() {
    renderStats();
    renderScene('start');
  });
})();
</script>
</body>
</html>
