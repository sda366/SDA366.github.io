<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史学习平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            text-align: center;
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .card h2 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        
        .card p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .card-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
        }
        
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 40px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 历史学习平台</h1>
        
        <div class="cards">
            <div class="card">
                <div class="card-icon">🏛️</div>
                <h2>中国古代朝代顺序游戏</h2>
                <p>通过趣味游戏学习中国古代朝代顺序，从夏商周到明清，挑战你的历史记忆！</p>
                <a href="game.html" class="card-btn">开始游戏</a>
            </div>
            
            <div class="card">
                <div class="card-icon">📖</div>
                <h2>欧洲思想解放运动</h2>
                <p>中外历史纲要（下）第8课完整教学课件，包含文艺复兴、宗教改革、启蒙运动等内容。</p>
                <a href="europe.html" class="card-btn">查看课件</a>
            </div>
            
            <div class="card">
                <div class="card-icon">🎯</div>
                <h2>更多内容</h2>
                <p>持续更新中...即将推出更多历史学习资源和互动游戏。</p>
                <a href="#" class="card-btn" onclick="alert('更多内容即将推出！')">敬请期待</a>
            </div>
        </div>
        
        <p class="footer">© 2026 历史学习平台 · 助力历史教学</p>
    </div>
</body>
</html>
